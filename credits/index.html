<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credits - Sharkdude's Arcade</title>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            /* Matching dark pink neon grid matrix background effect */
            background-image: 
                linear-gradient(rgba(255, 20, 147, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 20, 147, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Sign - Solid Un-flashing Neon Cyan Marquee */
        header {
            width: 100%;
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 3rem;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 
                0 0 5px #00ffff, 
                0 0 10px #00ffff, 
                0 0 20px #00ffff;
        }

        /* Container & Fluid Main Content Area */
        main {
            width: 100%;
            padding: 0 20px;
            max-width: 800px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Main Content Box - Chunky Neon Cyber Cyan Border */
        .content-box {
            background-color: rgba(0, 0, 0, 0.9);
            border: 6px solid #00ffff;
            border-radius: 16px;
            padding: 60px 40px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 15px #00ffff, inset 0 0 10px rgba(0,255,255,0.3);
        }

        /* Credits Text Placeholder - Plain White with Heavy 8-bit Block Shadows */
        .placeholder-text {
            color: #ffffff;
            font-weight: 900;
            font-size: 2rem;
            text-transform: uppercase;
            text-shadow: 
                3px 3px 0px #000000, 
                6px 6px 0px rgba(0, 0, 0, 0.9);
            margin-bottom: 40px;
        }

        /* Back to Arcade Dashboard Navigation Link */
        .back-link {
            display: inline-block;
            color: #ff007f; /* Vibrant Neon Pink */
            text-decoration: none;
            font-size: 1.2rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            border: 4px solid #ff007f;
            border-radius: 8px;
            padding: 12px 24px;
            text-shadow: 0 0 4px #ff007f;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
            transition: all 0.2s ease;
        }
        .back-link:hover {
            color: #ffffff;
            background-color: #ff007f;
            text-shadow: 0 0 8px #ffffff;
            box-shadow: 0 0 20px #ff007f;
        }

        /* Responsive Mobile Layout Tweaks */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .placeholder-text { font-size: 1.4rem; }
            .content-box { padding: 40px 20px; }
            .back-link { font-size: 1rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <!-- Header Sign -->
    <header>
        <h1>Sharkdude’s Arcade</h1>
    </header>

    <!-- Credits Content Card -->
    <main>
        <div class="content-box">
            <div class="placeholder-text">Credits:
			</div>
			<div>Sharkdude - Pirmary Coder</div>
			<div>Beedude - Primary Tester</div>
            <a href="../index.html" class="back-link">← Return to Arcade</a>
        </div>
    </main>

</body>
</html>
