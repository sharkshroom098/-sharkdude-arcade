<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharkdude's Arcade</title>
  <style>
    @import url('https://googleapis.com');

    /* RETRO ARCADE PITCH BLACK OVERRIDE */
    html, body {
      background-color: #05000a !important;
      background-image: 
        linear-gradient(rgba(255, 0, 127, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 127, 0.04) 1px, transparent 1px) !important;
      background-size: 25px 25px !important;
      margin: 0 !important;
      padding: 0 !important;
      font-family: 'Press Start 2P', 'Courier Prime', monospace !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: flex-start !important;
      min-height: 100vh !important;
      color: #39ff14 !important;
      box-sizing: border-box !important;
    }

    /* NEON CYAN HEADER MARQUEE SIGN */
    .arcade-header {
      margin: 40px 0 20px 0 !important;
      text-align: center !important;
    }
    
    .arcade-title {
      font-size: 28px !important; /* Made larger to scale with the screen */
      font-weight: bold !important;
      color: #00ffff !important;
      text-transform: uppercase !important;
      letter-spacing: -1px !important;
      text-shadow: 
        0 0 5px #00ffff,
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #006666 !important;
      animation: neonFlicker 4s infinite alternate !important;
    }

    @keyframes neonFlicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #006666;
        opacity: 1;
      }
      20%, 24%, 55% {
        text-shadow: none;
        opacity: 0.7;
      }
    }

    /* CABINET GRID ARCHITECTURE - Expanded up to 1000px max width so it feels zoomed-in */
    .dashboard-grid {
      display: grid !important;
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 24px !important;
      width: 100% !important;
      max-width: 1000px !important; 
      padding: 24px !important;
      box-sizing: border-box !important;
      margin-bottom: 40px !important;
    }

    /* ROUNDED RECTANGLE INTERACTIVE GAME TILES - Aspect ratio widened to 16/10 */
    .game-card {
      text-decoration: none !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
      align-items: center !important;
      border-radius: 16px !important;
      aspect-ratio: 16/10 !important; 
      background-size: cover !important;
      background-position: center !important;
      padding: 16px !important;
      box-sizing: border-box !important;
      position: relative !important;
      overflow: hidden !important;
      transition: transform 0.1s steps(3), box-shadow 0.1s steps(3) !important;
    }

    /* SYNTHWAVE FRAME NEONS */
    .game-card:nth-child(1) { 
      background-color: #12001a !important; background-image: linear-gradient(135deg, #4d0000, #12001a), url('adventure.png') !important;
      border: 3px solid #ff003c !important; box-shadow: 0 0 10px #ff003c !important; 
    }
    .game-card:nth-child(2) { 
      background-color: #12001a !important; background-image: linear-gradient(135deg, #002244, #12001a), url('fighter-pilot.png') !important;
      border: 3px solid #00ffff !important; box-shadow: 0 0 10px #00ffff !important; 
    }
    .game-card:nth-child(3) { 
      background-color: #12001a !important; background-image: linear-gradient(135deg, #004422, #12001a), url('neon-snake.png') !important;
      border: 3px solid #39ff14 !important; box-shadow: 0 0 10px #39ff14 !important; 
    }
    .game-card:nth-child(4) { 
      background-color: #12001a !important; background-image: linear-gradient(135deg, #443300, #12001a), url('2048.png') !important;
      border: 3px solid #ffaa00 !important; box-shadow: 0 0 10px #ffaa00 !important; 
    }
    .game-card:nth-child(5) { 
      background-color: #12001a !important; background-image: linear-gradient(135deg, #440033, #12001a), url('asteroid-evader.png') !important;
      border: 3px solid #ff007f !important; box-shadow: 0 0 10px #ff007f !important; 
    }

    /* Hover Scale Jumps */
    .game-card:hover { transform: scale(1.03) !important; }
    .game-card:nth-child(1):hover { box-shadow: 0 0 22px #ff003c !important; }
    .game-card:nth-child(2):hover { box-shadow: 0 0 22px #00ffff !important; }
    .game-card:nth-child(3):hover { box-shadow: 0 0 22px #39ff14 !important; }
    .game-card:nth-child(4):hover { box-shadow: 0 0 22px #ffaa00 !important; }
    .game-card:nth-child(5):hover { box-shadow: 0 0 22px #ff007f !important; }

    /* Contrast Shading Veil */
    .game-card::before {
      content: '' !important;
      position: absolute !important;
      top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
      background: rgba(0, 0, 0, 0.7) !important;
      z-index: 1 !important;
    }

    .card-content {
      position: relative !important;
      z-index: 2 !important;
      text-align: center !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
      align-items: center !important;
      width: 100% !important;
      height: 100% !important;
    }

    .game-title {
      color: #ffffff !important;
      font-size: 14px !important; /* Bumped text size up for high legibility */
      font-weight: bold !important;
      text-transform: uppercase !important;
      text-shadow: 2px 2px 0px #000 !important;
      margin: 0 !important;
      letter-spacing: -1px !important;
      line-height: 1.4 !important;
    }

    /* BLINKING COMING SOON ROUNDED RECTANGLE SLOTS */
    .placeholder-card {
      border: 3px dashed #440033 !important;
      border-radius: 16px !important;
      aspect-ratio: 16/10 !important; /* Matching widened layout aspect ratio */
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      color: #ff007f !important;
      font-weight: bold !important;
      font-size: 11px !important;
      text-transform: uppercase !important;
      background-color: #0d0014 !important;
      text-shadow: 0 0 5px #ff007f !important;
      box-shadow: inset 0 0 10px rgba(255, 0, 127, 0.05) !important;
      animation: coinBlink 3s infinite steps(2) !important;
    }

    @keyframes coinBlink {
      0% { opacity: 1; border-color: #440033; }
      50% { opacity: 0.5; border-color: #ff007f; }
    }

    @media (max-width: 500px) {
      .arcade-title { font-size: 18px !important; }
      .dashboard-grid { gap: 12px !important; padding: 12px !important; }
      .game-title { font-size: 10px !important; }
      .placeholder-card { font-size: 8px !important; }
    }
  </style>
</head>

</body>
</html>
